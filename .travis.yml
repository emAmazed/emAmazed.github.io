language: ruby
before_install:
  - bundle install
rvm:
  - 1.9.3
  - 2.0.0
  - 2.1.0
script: "bundle exec rake overalls"
notifications:
  irc:
    on_success: change
    on_failure: change
    channels:
      - "irc.freenode.org#emAmazed"
    template:
      - "%{repository}#%{build_number} (%{branch}) %{message} %{build_url}"
    email:
      on_success: never
      on_failure: never

